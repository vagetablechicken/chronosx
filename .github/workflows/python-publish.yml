name: Publish to PyPI

on:
  push:
    tags:
      - "v*" # 当推送形如 v1.2.3 的标签时触发

jobs:
  build-n-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    
    # 关键：OIDC 发布需要 id-token 权限
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        # 使用 Trusted Publishers 时，uv 会自动处理身份验证
        run: uv publish
